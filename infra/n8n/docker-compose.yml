name: editorial-ai-n8n

services:
  n8n:
    image: ${N8N_IMAGE:-docker.n8n.io/n8nio/n8n:latest}
    container_name: editorial-ai-n8n
    restart: unless-stopped
    ports:
      - "${N8N_BIND_ADDRESS:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    environment:
      TZ: ${TZ:-Europe/Madrid}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Madrid}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in infra/n8n/.env}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../automations/n8n:/home/node/editorial-workflows:ro

volumes:
  n8n_data:
    name: editorial_ai_n8n_data
